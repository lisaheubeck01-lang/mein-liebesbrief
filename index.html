<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ein Brief für Dich</title>
<link rel="preconnect" href=https://fonts.googleapis.com>
<link href=https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;500;600;700&display=swap rel="stylesheet">
<style>
  :root{
    --parchment:#f2e6c9;
    --parchment-dark:#e3d2a4;
    --ink:#2c1e12;
    --ink-soft:#5a4227;
    --wax:#8a1520;
    --wax-dark:#5c0e17;
    --wax-light:#b3392b;
    --gold:#b8924f;
    --gold-soft:#dcc38a;
    --envelope:#dcc79c;
    --envelope-dark:#c3a877;
    --envelope-line:#a98c5c;
    --scene-1:#141019;
    --scene-2:#231a24;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 30%, #3a2a2e 0%, var(--scene-2) 45%, var(--scene-1) 100%);
    font-family:'Cormorant Garamond', serif;
    color:var(--parchment);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
  }
  .stage{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }
  .eyebrow{
    letter-spacing:.32em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold-soft);
    opacity:.85;
    text-align:center;
  }
 
  /* ---------- COMPOSE ---------- */
  .composer{
    width:100%;
    background:linear-gradient(180deg, rgba(45,33,30,.92), rgba(30,22,20,.92));
    border:1px solid rgba(184,146,79,.35);
    border-radius:6px;
    padding:32px 28px 26px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .composer h1{
    font-family:'Great Vibes', cursive;
    font-weight:400;
    font-size:44px;
    margin:0 0 4px;
    color:var(--gold-soft);
    text-align:center;
  }
  .composer p.sub{
    text-align:center;
    margin:0 0 26px;
    font-style:italic;
    color:var(--parchment-dark);
    font-size:16px;
  }
  .field{margin-bottom:18px;}
  .field label{
    display:block;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%;
    background:rgba(242,230,201,.06);
    border:1px solid rgba(184,146,79,.4);
    border-radius:3px;
    color:var(--parchment);
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    padding:10px 12px;
    resize:vertical;
  }
  .field textarea{
    font-family:'Caveat', cursive;
    font-size:24px;
    line-height:1.5;
    min-height:220px;
  }
  .field input:focus, .field textarea:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  .btn-row{display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;}
  button{
    font-family:'Cormorant Garamond', serif;
    font-size:16px;
    letter-spacing:.04em;
    cursor:pointer;
    border-radius:3px;
    padding:12px 22px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold-soft);
    transition:background .2s ease, color .2s ease, transform .15s ease;
  }
  button:hover{background:var(--gold); color:#241a10;}
  button:active{transform:scale(.97);}
  button.primary{
    background:var(--wax);
    border-color:var(--wax-light);
    color:#f6e8dc;
    flex:1;
    min-width:220px;
  }
  button.primary:hover{background:var(--wax-light);}
  button:focus-visible{outline:2px solid var(--gold-soft); outline-offset:2px;}
 
  /* ---------- ENVELOPE SCENE ---------- */
  .env-scene{ perspective:1400px; display:none; flex-direction:column; align-items:center; gap:22px; }
  .env-scene.active{display:flex;}
  .envelope-wrap{ position:relative; width:340px; max-width:88vw; }
  .envelope{
    position:relative;
    width:100%;
    aspect-ratio: 340 / 226;
    background:linear-gradient(160deg, var(--envelope), var(--envelope-dark));
    border-radius:4px;
    box-shadow:0 24px 50px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.08) inset;
    transform-style:preserve-3d;
  }
  .fold-line{
    position:absolute; inset:0;
    background:linear-gradient(160deg, transparent, transparent);
  }
  .fold-left, .fold-right{
    position:absolute; top:0; width:50%; height:100%;
    background:linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.12));
    clip-path:polygon(0 0, 100% 50%, 0 100%);
    opacity:.5;
  }
  .fold-left{left:0;}
  .fold-right{right:0; transform:scaleX(-1);}
  .address{
    position:absolute; left:0; right:0; bottom:18%;
    text-align:center;
    font-family:'Great Vibes', cursive;
    font-size:26px;
    color:var(--ink-soft);
    z-index:2;
    padding:0 20px;
  }
  .flap{
    position:absolute; top:0; left:0; width:100%; height:62%;
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    background:linear-gradient(160deg, var(--envelope-dark), var(--envelope));
    transform-origin:top center;
    transform:rotateX(0deg);
    transition:transform 1.1s cubic-bezier(.62,.06,.3,1);
    box-shadow:0 1px 0 rgba(0,0,0,.15) inset;
    z-index:5;
  }
  .flap.open{ transform:rotateX(178deg); }
  .seal{
    position:absolute;
    top:38%;
    left:50%;
    width:64px; height:64px;
    transform:translate(-50%,-50%);
    z-index:8;
    cursor:pointer;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
    transition:transform .2s ease;
  }
  .seal:hover{transform:translate(-50%,-50%) scale(1.05);}
  .seal:focus-visible{outline:2px solid var(--gold-soft); outline-offset:4px; border-radius:50%;}
  .seal-half{
    position:absolute; top:0; width:64px; height:64px; border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--wax-light) 0%, var(--wax) 45%, var(--wax-dark) 100%);
    clip-path:polygon(0 0, 50% 0, 50% 100%, 0 100%);
    transition:transform .6s cubic-bezier(.55,0,.2,1), opacity .6s ease;
  }
  .seal-half.right{clip-path:polygon(50% 0, 100% 0, 100% 100%, 50% 100%);}
  .seal-letter{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:2;
    pointer-events:none;
  }
  .seal-letter svg{
    width:28px; height:28px;
    fill:#e9c9a3;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.55)) drop-shadow(0 -1px 0 rgba(255,255,255,.12));
  }
  .seal.cracked .seal-half.left{transform:translate(-30px,6px) rotate(-25deg); opacity:0;}
  .seal.cracked .seal-half.right{transform:translate(30px,6px) rotate(25deg); opacity:0;}
  .seal.cracked .seal-letter{opacity:0; transition:opacity .3s ease;}
 
  .hint{
    font-style:italic;
    color:var(--parchment-dark);
    font-size:16px;
    text-align:center;
    opacity:.85;
  }
