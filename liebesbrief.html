<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ein Brief für Dich</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#f2e6c9;
    --parchment-dark:#e3d2a4;
    --ink:#2c1e12;
    --ink-soft:#5a4227;
    --wax:#8a1520;
    --wax-dark:#5c0e17;
    --wax-light:#b3392b;
    --gold:#b8924f;
    --gold-soft:#dcc38a;
    --envelope:#dcc79c;
    --envelope-dark:#c3a877;
    --envelope-line:#a98c5c;
    --scene-1:#141019;
    --scene-2:#231a24;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 30%, #3a2a2e 0%, var(--scene-2) 45%, var(--scene-1) 100%);
    font-family:'Cormorant Garamond', serif;
    color:var(--parchment);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
  }
  .stage{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }
  .eyebrow{
    letter-spacing:.32em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold-soft);
    opacity:.85;
    text-align:center;
  }

  /* ---------- COMPOSE ---------- */
  .composer{
    width:100%;
    background:linear-gradient(180deg, rgba(45,33,30,.92), rgba(30,22,20,.92));
    border:1px solid rgba(184,146,79,.35);
    border-radius:6px;
    padding:32px 28px 26px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .composer h1{
    font-family:'Great Vibes', cursive;
    font-weight:400;
    font-size:44px;
    margin:0 0 4px;
    color:var(--gold-soft);
    text-align:center;
  }
  .composer p.sub{
    text-align:center;
    margin:0 0 26px;
    font-style:italic;
    color:var(--parchment-dark);
    font-size:16px;
  }
  .field{margin-bottom:18px;}
  .field label{
    display:block;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%;
    background:rgba(242,230,201,.06);
    border:1px solid rgba(184,146,79,.4);
    border-radius:3px;
    color:var(--parchment);
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    padding:10px 12px;
    resize:vertical;
  }
  .field textarea{
    font-family:'Caveat', cursive;
    font-size:24px;
    line-height:1.5;
    min-height:220px;
  }
  .field input:focus, .field textarea:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  .btn-row{display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;}
  button{
    font-family:'Cormorant Garamond', serif;
    font-size:16px;
    letter-spacing:.04em;
    cursor:pointer;
    border-radius:3px;
    padding:12px 22px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold-soft);
    transition:background .2s ease, color .2s ease, transform .15s ease;
  }
  button:hover{background:var(--gold); color:#241a10;}
  button:active{transform:scale(.97);}
  button.primary{
    background:var(--wax);
    border-color:var(--wax-light);
    color:#f6e8dc;
    flex:1;
    min-width:220px;
  }
  button.primary:hover{background:var(--wax-light);}
  button:focus-visible{outline:2px solid var(--gold-soft); outline-offset:2px;}

  /* ---------- ENVELOPE SCENE ---------- */
  .env-scene{ perspective:1400px; display:none; flex-direction:column; align-items:center; gap:22px; }
  .env-scene.active{display:flex;}
  .envelope-wrap{ position:relative; width:340px; max-width:88vw; }
  .envelope{
    position:relative;
    width:100%;
    aspect-ratio: 340 / 226;
    background:linear-gradient(160deg, var(--envelope), var(--envelope-dark));
    border-radius:4px;
    box-shadow:0 24px 50px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.08) inset;
    transform-style:preserve-3d;
  }
  .fold-line{
    position:absolute; inset:0;
    background:linear-gradient(160deg, transparent, transparent);
  }
  .fold-left, .fold-right{
    position:absolute; top:0; width:50%; height:100%;
    background:linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.12));
    clip-path:polygon(0 0, 100% 50%, 0 100%);
    opacity:.5;
  }
  .fold-left{left:0;}
  .fold-right{right:0; transform:scaleX(-1);}
  .address{
    position:absolute; left:0; right:0; bottom:18%;
    text-align:center;
    font-family:'Great Vibes', cursive;
    font-size:26px;
    color:var(--ink-soft);
    z-index:2;
    padding:0 20px;
  }
  .flap{
    position:absolute; top:0; left:0; width:100%; height:62%;
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    background:linear-gradient(160deg, var(--envelope-dark), var(--envelope));
    transform-origin:top center;
    transform:rotateX(0deg);
    transition:transform 1.1s cubic-bezier(.62,.06,.3,1);
    box-shadow:0 1px 0 rgba(0,0,0,.15) inset;
    z-index:5;
  }
  .flap.open{ transform:rotateX(178deg); }
  .seal{
    position:absolute;
    top:38%;
    left:50%;
    width:64px; height:64px;
    transform:translate(-50%,-50%);
    z-index:8;
    cursor:pointer;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
    transition:transform .2s ease;
  }
  .seal:hover{transform:translate(-50%,-50%) scale(1.05);}
  .seal:focus-visible{outline:2px solid var(--gold-soft); outline-offset:4px; border-radius:50%;}
  .seal-half{
    position:absolute; top:0; width:64px; height:64px; border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--wax-light) 0%, var(--wax) 45%, var(--wax-dark) 100%);
    clip-path:polygon(0 0, 50% 0, 50% 100%, 0 100%);
    transition:transform .6s cubic-bezier(.55,0,.2,1), opacity .6s ease;
  }
  .seal-half.right{clip-path:polygon(50% 0, 100% 0, 100% 100%, 50% 100%);}
  .seal-letter{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:2;
    pointer-events:none;
  }
  .seal-letter svg{
    width:28px; height:28px;
    fill:#e9c9a3;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.55)) drop-shadow(0 -1px 0 rgba(255,255,255,.12));
  }
  .seal.cracked .seal-half.left{transform:translate(-30px,6px) rotate(-25deg); opacity:0;}
  .seal.cracked .seal-half.right{transform:translate(30px,6px) rotate(25deg); opacity:0;}
  .seal.cracked .seal-letter{opacity:0; transition:opacity .3s ease;}

  .hint{
    font-style:italic;
    color:var(--parchment-dark);
    font-size:16px;
    text-align:center;
    opacity:.85;
  }

  /* letter sliding out of the envelope before full-screen reading */
  .letter-peek{
    position:absolute;
    left:50%; top:8%;
    width:86%;
    height:10px;
    transform:translateX(-50%) translateY(0);
    background:var(--parchment);
    border-radius:2px;
    opacity:0;
    z-index:3;
    transition:transform 1s cubic-bezier(.2,.7,.3,1), opacity .4s ease, height 1s ease;
  }
  .letter-peek.rise{
    opacity:1;
    height:220px;
    transform:translateX(-50%) translateY(-160px);
  }

  /* ---------- READING SCENE ---------- */
  .reading{ display:none; width:100%; }
  .reading.active{ display:block; animation:fadeIn .7s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .paper{
    background:
      repeating-linear-gradient(180deg, rgba(0,0,0,0) 0 38px, rgba(120,95,55,.05) 39px 40px),
      linear-gradient(160deg, var(--parchment), var(--parchment-dark));
    color:var(--ink);
    border-radius:2px;
    padding:38px 34px 30px;
    box-shadow:0 30px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(120,95,45,.25) inset;
    position:relative;
  }
  .paper::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid rgba(120,95,45,.25);
    pointer-events:none;
  }
  .paper .salutation{
    font-family:'Caveat', cursive;
    font-size:30px;
    margin:0 0 14px;
    color:var(--wax-dark);
  }
  .paper .letter-body{
    font-family:'Caveat', cursive;
    font-size:24px;
    line-height:1.65;
    white-space:pre-wrap;
    margin:0 0 22px;
  }
  .paper .signature{
    font-family:'Great Vibes', cursive;
    font-size:32px;
    text-align:right;
    color:var(--wax-dark);
    margin:0;
  }
  .reading-actions{
    display:flex; gap:12px; justify-content:center; margin-top:22px; flex-wrap:wrap;
  }

  .share-row{
    width:100%;
    display:flex; gap:10px; margin-top:6px;
    flex-wrap:wrap;
  }
  .share-row input{
    flex:1;
    min-width:160px;
    background:rgba(242,230,201,.06);
    border:1px solid rgba(184,146,79,.4);
    border-radius:3px;
    color:var(--parchment-dark);
    font-size:13px;
    padding:9px 10px;
    font-family:monospace;
  }
  .copied-msg{
    font-size:13px;
    color:var(--gold-soft);
    text-align:center;
    min-height:16px;
  }

  @media (prefers-reduced-motion: reduce){
    .flap, .seal-half, .letter-peek, .reading.active{ transition:none !important; animation:none !important; }
  }

  @media (max-width:480px){
    .composer{padding:24px 18px;}
    .composer h1{font-size:36px;}
    .paper{padding:26px 20px 22px;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="eyebrow">Ein persönlicher Brief</div>

  <!-- COMPOSE -->
  <section class="composer" id="composer">
    <h1>Schreib deine Zeilen</h1>
    <p class="sub">Verfasse deinen Brief — er wird versiegelt, bereit zum Öffnen.</p>

    <div class="field">
      <label for="toName">Für wen ist der Brief?</label>
      <input id="toName" type="text" placeholder="z. B. Meine Liebste" maxlength="60">
    </div>

    <div class="field">
      <label for="salutation">Anrede</label>
      <input id="salutation" type="text" placeholder="z. B. Meine Liebste," maxlength="60" value="Meine Liebste,">
    </div>

    <div class="field">
      <label for="body">Dein Brief</label>
      <textarea id="body" placeholder="Schreibe hier, was dein Herz bewegt...">Seit dem Moment, in dem ich dich kennengelernt habe, ist mein Leben heller geworden.

Ich wollte dir nur sagen, wie sehr du mir fehlst, wie sehr ich mich auf jeden gemeinsamen Tag freue, und wie dankbar ich bin, dass es dich gibt.

Für immer Deiner,</textarea>
    </div>

    <div class="field">
      <label for="signature">Unterschrift</label>
      <input id="signature" type="text" placeholder="z. B. Dein L." maxlength="40" value="Dein L.">
    </div>

    <div class="btn-row">
      <button class="primary" id="sealBtn">Brief versiegeln</button>
    </div>
  </section>

  <!-- ENVELOPE -->
  <section class="env-scene" id="envScene">
    <div class="envelope-wrap">
      <div class="envelope" id="envelope">
        <div class="letter-peek" id="letterPeek"></div>
        <div class="fold-left"></div>
        <div class="fold-right"></div>
        <div class="address" id="addressLine">Für Dich</div>
        <div class="flap" id="flap"></div>
        <div class="seal" id="seal" role="button" tabindex="0" aria-label="Siegel öffnen, um den Brief zu lesen">
          <div class="seal-half left"></div>
          <div class="seal-half right"></div>
          <div class="seal-letter">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s-6.7-4.2-9.3-8.2C1 10.2 1.6 6.7 4.4 5.1 6.8 3.7 9.7 4.4 12 7c2.3-2.6 5.2-3.3 7.6-1.9 2.8 1.6 3.4 5.1 1.7 7.7C18.7 16.8 12 21 12 21z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
    <p class="hint">Klicke auf das Siegel, um den Brief zu öffnen</p>
    <button id="editFromEnvelope">Brief bearbeiten</button>
  </section>

  <!-- READING -->
  <section class="reading" id="reading">
    <div class="paper">
      <p class="salutation" id="readSalutation">Meine Liebste,</p>
      <p class="letter-body" id="readBody"></p>
      <p class="signature" id="readSignature">Dein L.</p>
    </div>
    <div class="reading-actions">
      <button id="resealBtn">Erneut versiegeln</button>
      <button id="editFromReading">Neu schreiben</button>
    </div>
    <div class="share-row">
      <input id="shareLink" type="text" readonly placeholder="Link erscheint hier...">
      <button id="copyLinkBtn">Kurzlink erstellen &amp; kopieren</button>
    </div>
    <p class="copied-msg" id="copiedMsg"></p>
  </section>

</div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const composer = $('composer');
  const envScene = $('envScene');
  const reading = $('reading');
  const flap = $('flap');
  const seal = $('seal');
  const letterPeek = $('letterPeek');
  const addressLine = $('addressLine');

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function b64EncodeUnicode(str){
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m,p1)=>String.fromCharCode('0x'+p1)));
  }
  function b64DecodeUnicode(str){
    return decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  }

  function showOnly(el){
    [composer, envScene, reading].forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    if(el === composer){ el.style.display='block'; }
    else { el.style.display='flex'; el.classList.add('active'); }
  }

  function currentData(){
    return {
      to: $('toName').value.trim(),
      sal: $('salutation').value.trim() || 'Meine Liebste,',
      body: $('body').value,
      sig: $('signature').value.trim() || 'Dein L.'
    };
  }

  function resetSealVisual(){
    seal.classList.remove('cracked');
    flap.classList.remove('open');
    letterPeek.classList.remove('rise');
  }

  function goToEnvelope(data){
    addressLine.textContent = data.to ? ('Für ' + data.to) : 'Für Dich';
    resetSealVisual();
    showOnly(envScene);
  }

  function goToReading(data){
    $('readSalutation').textContent = data.sal;
    $('readBody').textContent = data.body;
    $('readSignature').textContent = data.sig;
    showOnly(reading);

    const payload = { to: data.to, sal: data.sal, body: data.body, sig: data.sig };
    try{
      const encoded = b64EncodeUnicode(JSON.stringify(payload));
      const url = location.origin + location.pathname + '#brief=' + encoded;
      $('shareLink').value = url;
    }catch(e){
      $('shareLink').value = '';
    }
    $('copiedMsg').textContent = '';
  }

  function openEnvelope(data){
    if(reducedMotion){
      goToReading(data);
      return;
    }
    seal.classList.add('cracked');
    setTimeout(() => {
      flap.classList.add('open');
    }, 350);
    setTimeout(() => {
      letterPeek.classList.add('rise');
    }, 700);
    setTimeout(() => {
      goToReading(data);
    }, 1750);
  }

  // Compose -> seal
  $('sealBtn').addEventListener('click', () => {
    const data = currentData();
    goToEnvelope(data);
  });

  // Seal click / keyboard -> open
  function triggerOpen(){
    const data = currentData();
    openEnvelope(data);
  }
  seal.addEventListener('click', triggerOpen);
  seal.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); triggerOpen(); }
  });

  $('editFromEnvelope').addEventListener('click', () => showOnly(composer));
  $('editFromReading').addEventListener('click', () => showOnly(composer));
  $('resealBtn').addEventListener('click', () => {
    const data = currentData();
    goToEnvelope(data);
  });

  // Best-effort shortening via a free public shortener (is.gd), routed through
  // a CORS proxy since is.gd itself doesn't send CORS headers for browser fetch.
  // If this fails (offline, service down, etc.) we simply fall back to the full link.
  async function shortenUrl(longUrl){
    const target = 'https://is.gd/create.php?format=simple&url=' + encodeURIComponent(longUrl);
    const proxied = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(target);
    const res = await fetch(proxied);
    if(!res.ok) throw new Error('Shortener request failed');
    const text = (await res.text()).trim();
    if(!text.startsWith('http')) throw new Error('Unexpected shortener response');
    return text;
  }

  $('copyLinkBtn').addEventListener('click', async () => {
    const longUrl = $('shareLink').value;
    if(!longUrl) return;

    $('copiedMsg').textContent = 'Kurzlink wird erstellt...';
    let finalUrl = longUrl;
    try{
      finalUrl = await shortenUrl(longUrl);
      $('shareLink').value = finalUrl;
    }catch(e){
      // fall back silently to the full link below
    }

    try{
      await navigator.clipboard.writeText(finalUrl);
      $('copiedMsg').textContent = (finalUrl !== longUrl)
        ? 'Kurzlink kopiert — bereit zum Versenden.'
        : 'Link kopiert (Kürzen war gerade nicht möglich).';
    }catch(e){
      $('shareLink').select();
      $('copiedMsg').textContent = 'Bitte manuell kopieren (markiert).';
    }
  });

  // Load from shared link if present
  function loadFromHash(){
    const hash = location.hash;
    const marker = '#brief=';
    if(hash.startsWith(marker)){
      try{
        const encoded = hash.slice(marker.length);
        const data = JSON.parse(b64DecodeUnicode(encoded));
        $('toName').value = data.to || '';
        $('salutation').value = data.sal || 'Meine Liebste,';
        $('body').value = data.body || '';
        $('signature').value = data.sig || 'Dein L.';
        goToEnvelope({ to: data.to, sal: data.sal, body: data.body, sig: data.sig });
        return true;
      }catch(e){ /* fall through to composer */ }
    }
    return false;
  }

  if(!loadFromHash()){
    showOnly(composer);
  }
})();
</script>

</body>
</html>
